name: TDD Proof Qualification

on:
  pull_request_target:
    branches: [ main ]

jobs:
  qualify_and_merge:
    name: Mathematical Gatekeeper
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # 1. Checkout the PR's code
      - name: Checkout Pull Request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # 2. Immutable Test Enforcement (The Anti-Tamper Lock)
      - name: Enforce Immutable Test Suite
        run: |
          git fetch origin develop
          git checkout origin/develop -- TDD_PROOF/tests/
          git checkout origin/develop -- TDD_PROOF/requirements.txt

      # 3. Setup Python Environment
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      # 4. Install Dependencies
      - name: Install Math Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Execute 9D Spectral Proof Engine (Strict Mode)
      - name: Execute 2052-Test Riemann Suite
        run: |
          pytest tests/ -q --tb=short -W error

      # 6. Autonomous Merge (Only executes if Step 5 passes flawlessly)
      - name: Autonomous Pull Request Merge
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash --yes
          echo "✅ Pull request passed mathematical qualification and was merged autonomously."
